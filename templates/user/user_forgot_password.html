{% extends "user/user_base.html" %}
{% block title %}Forgot Password - Keerthi's SmartCart{% endblock %}

{% block content %}
<div class="auth-box">
    <div class="card glass-effect">
        <h2 style="text-align: center; margin-bottom: 30px;">Forgot Password</h2>
        
        <form method="POST" action="/user/forgot-password">
            <div class="form-group">
                <label for="email">Email Address</label>
                <input type="email" id="email" name="email" placeholder="john@example.com" required>
            </div>
            
            <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 10px;">
                <i class="ph ph-envelope"></i> Send Reset Link
            </button>
        </form>
        
        <div style="text-align: center; margin-top: 25px; color: var(--text-muted); font-size: 0.9rem;">
            Remember your password? <a href="/user-login" style="color: var(--accent-primary); font-weight: 600;">Login here</a>
        </div>
    </div>
</div>
{% endblock %}

{% extends "user/user_base.html" %}

{% block title %}Verify OTP - Keerthi's SmartCart{% endblock %}

{% block content %}
<div class="auth-box">
    <div class="card glass-effect">
        <h2 style="text-align: center; margin-bottom: 30px;">Verify OTP</h2>
        
        <form method="POST" action="/user-verify-otp">
            <div class="form-group">
                <label for="otp">Enter OTP</label>
                <input type="text" id="otp" name="otp" placeholder="123456" required>
            </div>
            
            <div class="form-group">
                <label for="password">Create Password</label>
                <input type="password" id="password" name="password" placeholder="••••••••" required>
            </div>
            
            <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 10px;">
                <i class="ph ph-check-circle"></i> Verify & Register
            </button>
        </form>
    </div>
</div>
{% endblock %}

{% extends "user/user_base.html" %}
{% block title %}Reset Password - Keerthi's SmartCart{% endblock %}

{% block content %}
<div class="auth-box">
    <div class="card glass-effect">
        <h2 style="text-align: center; margin-bottom: 30px;">Reset Password</h2>
        
        <form method="POST" action="/user/reset-password/{{ token }}">
            <div class="form-group">
                <label for="password">New Password</label>
                <input type="password" id="password" name="password" placeholder="••••••••" required>
            </div>
            
            <div class="form-group">
                <label for="confirm_password">Confirm New Password</label>
                <input type="password" id="confirm_password" name="confirm_password" placeholder="••••••••" required>
            </div>
            
            <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 10px;">
                <i class="ph ph-lock-key"></i> Reset Password
            </button>
        </form>
    </div>
</div>
{% endblock %}
